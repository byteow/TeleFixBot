services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always 
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: telefix
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - main
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d telefix"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONPATH=/app:/app/src
    volumes:
      - .:/app
    command: >
       sh -c "alembic -c alembic.ini upgrade head && python src/aiogram_run.py"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - main

volumes:
  postgres_data:

networks:
  main: