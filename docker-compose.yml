services:
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always 
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: goofishparser
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - main

  app:
    build:
      context: ./src
      dockerfile: Dockerfile
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "alembic upgrade head && python aiogram_run.py"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - main

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - main

  celery_worker:
    build:
      context: ./src
      dockerfile: ../Dockerfile
    command: celery -A celery_worker.worker worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - main

volumes:
  redis_data:
  postgres_data:
networks:
  main: